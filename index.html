  <h1>SAS ↔ R Clinical Programming</h1>
  <p>By Venkat Sai</p>

  <h2>Example 1: PROC MEANS vs dplyr</h2>
  <pre>
SAS:
proc means data=adsl;
class trtp;
var age;
run;
  </pre>

  <pre>
R:
library(dplyr)
adsl %>%
 group_by(trtp) %>%
 summarise(mean_age=mean(age, na.rm=TRUE))
  </pre>
